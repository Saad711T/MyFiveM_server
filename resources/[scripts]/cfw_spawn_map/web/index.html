:root{--accent:#4cc9f0;--accent2:#80ffdb;--danger:#ff5c5c;--gold:#ffd166}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
body{background:transparent;overflow:hidden}
#app{position:fixed;inset:0;display:grid;place-items:center}

.overlay{position:absolute;inset:0;background:radial-gradient(1400px 900px at 50% 0%,rgba(76,201,240,.12),transparent),rgba(0,0,0,.8);backdrop-filter:blur(6px)}

.header{text-align:center;margin-bottom:16px}
h1{font-size:26px;color:#fff;letter-spacing:.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#9aa4af;font-size:13px;margin-top:4px}
.close-btn{position:absolute;top:16px;left:16px;z-index:30;width:42px;height:42px;background:rgba(255,92,92,.12);border:1px solid rgba(255,92,92,.4);color:var(--danger);border-radius:12px;font-size:26px;line-height:1;cursor:pointer;transition:all .15s ease}
.close-btn:hover{background:var(--danger);color:#fff;transform:rotate(90deg)}

.point::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--danger);animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.9}100%{transform:scale(2.6);opacity:0}}
.point:hover{transform:translate(-50%,-50%) scale(1.25);background:var(--gold);box-shadow:0 0 0 6px rgba(255,209,102,.4),0 6px 16px rgba(0,0,0,.6);z-index:20}
.point:hover::after{border-color:var(--gold)}
.label{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:rgba(11,15,18,.96);border:1px solid rgba(128,255,219,.4);color:#fff;font-size:13px;font-weight:600;padding:6px 12px;border-radius:8px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s ease}
.point:hover .label{opacity:1}
@media (max-width:520px){.panel{width:95vw;padding:14px}h1{font-size:20px}.point{width:22px;height:22px}}
</style>
</head>
<body>
<div id="app" class="hidden">
<div class="overlay"></div>
<div class="panel">
<button id="closeBtn" class="close-btn" title="إغلاق (ESC)">&times;</button>
<header class="header">
<h1>اختر نقطة الظهور</h1>
<p class="subtitle">انقر على أي نقطة حمراء للظهور — أو X للإلغاء</p>
</header>
<div class="map-wrap"><div id="points"></div></div>
</div>
</div>
<script>
const RES='cfw_spawn_map';
const $app=document.getElementById('app');
const $points=document.getElementById('points');
const $close=document.getElementById('closeBtn');
const POINTS=[
{id:'missionrow',label:'مركز شرطة ميشن رو',xp:75.3,yp:50.5},
{id:'simeon',label:'معرض سيميون',xp:76.3,yp:54.6},
{id:'airport',label:'مطار لوس سانتوس',xp:85.5,yp:60.9},
{id:'vespucci',label:'شاطئ فيسبوتشي',xp:79.0,yp:66.2},
{id:'sandy',label:'مطار ساندي شورز',xp:41.2,yp:40.1},
{id:'paleto',label:'كلاكن بيل - بيليتو',xp:17.4,yp:55.5}
];
let busy=false;
// أبلغ الـ client أن الواجهة جاهزة فوراً عند التحميل
function notifyReady(){fetch(`https://${RES}/nuiReady`,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).catch(()=>{})}
function post(n,d){return fetch(`https://${RES}/${n}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d||{})}).catch(()=>{})}
function build(){$points.innerHTML='';POINTS.forEach(p=>{const e=document.createElement('div');e.className='point';e.style.left=p.xp+'%';e.style.top=p.yp+'%';e.innerHTML=`<span class="label">${p.label}</span>`;e.onclick=()=>choose(p.id);$points.appendChild(e)})}
function choose(id){if(busy)return;busy=true;hide();post('choose',{id})}
function show(){$app.classList.remove('hidden')}
function hide(){$app.classList.add('hidden')}
$close.onclick=()=>{if(busy)return;hide();post('forceClose',{})};
window.addEventListener('load',notifyReady);
notifyReady();
window.addEventListener('message',e=>{const m=e.data||{};if(m.action==='open'){busy=false;build();show()}else if(m.action==='close'){hide()}});
window.addEventListener('keydown',e=>{if(e.key==='Escape'){e.preventDefault();if(!busy){hide();post('forceClose',{})}}});
</script>
</body>
</html>
